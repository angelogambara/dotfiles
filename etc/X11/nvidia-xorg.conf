# nvidia-xconfig: X configuration file generated by nvidia-xconfig
# nvidia-xconfig:  version 580.105.08

Section "ServerLayout"
    Identifier     "nvidia_layout"
    Screen      0  "nvidia_screen"
    Inactive       "intel_device"
    Option         "Xinerama" "0"
EndSection

Section "Module"
    Disable        "glamoregl"
EndSection

Section "Monitor"
    Identifier     "nvidia_monitor"
    Option         "DPMS"
EndSection

Section "Device"
    Identifier     "nvidia_device"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
    BusID          "PCI:1:0:0"
EndSection

Section "Screen"
    Identifier     "nvidia_screen"
    Device         "nvidia_device"
    Monitor        "nvidia_monitor"
    DefaultDepth    24
    SubSection     "Display"
        Depth       24
    EndSubSection
    Option          "AllowEmptyInitialConfiguration" "Yes"
EndSection

Section "Monitor"
    Identifier     "intel_monitor"
    Option         "DPMS"
EndSection

Section "Device"
    Identifier     "intel_device"
    Driver         "modesetting"
    VendorName     "Intel Corporation"
    BusID          "PCI:0:2:0"
    Option         "AccelMethod" "none"
EndSection

Section "Screen"
    Identifier     "intel_screen"
    Device         "intel_device"
    Monitor        "intel_monitor"
    DefaultDepth    24
    SubSection     "Display"
        Depth       24
    EndSubSection
EndSection

