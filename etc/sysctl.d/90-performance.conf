# 1. Virtual Memory & Swapping
vm.swappiness = 10
vm.vfs_cache_pressure = 50

# 2. Network Stack - Low Latency & High Throughput
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3

# 3. Proton Gaming - Remove max_map_count and file limits
vm.max_map_count = 1048576
fs.file-max = 2097152
