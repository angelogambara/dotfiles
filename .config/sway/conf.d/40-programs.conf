# ==============================
# User Programs
# ==============================

exec --no-startup-id autotiling
exec --no-startup-id dunst
exec --no-startup-id fcitx5
exec --no-startup-id notify-checkupdates
exec --no-startup-id pipewire-pulse
exec --no-startup-id udiskie

exec --no-startup-id \
  swayidle -w \
    timeout 241 "swaymsg output DP-1 dpms off" \
      resume "swaymsg output DP-1 dpms on" \
    timeout 301 "pgrep swaylock || swaylock & systemctl suspend" \
    timeout  61 "pgrep swaylock && systemctl suspend"
