# ==============================
# Alacritty Configuration
# ==============================

[general]
import = [
  "~/.config/alacritty/gruvbox-dark.toml"
]

[window]
opacity = 0.85

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
size = 9.0

[keyboard]
bindings = [
  { key = "N", mods = "Control|Shift", command = { program = "sh", args = ["-c", "WORKDIR_SET=1 alacritty"] } }
]
