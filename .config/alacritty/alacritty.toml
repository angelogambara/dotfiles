[general]
import = ["~/.config/alacritty/gruvbox-dark.toml"]

[window]
opacity = 0.85

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
size = 16.0

[keyboard]
bindings = [
  { key = "N",      mods = "Control|Shift", command = { program = "sh", args = ["-c", "WORKDIR_SET=1 alacritty"] } },
  { key = "Return", mods = "Control|Shift", command = { program = "sh", args = ["-c", "WORKDIR_SET=1 alacritty"] } },
]
