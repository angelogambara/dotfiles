# ==============================
# Alacritty Configuration
# ==============================

[general]
import = [
  # uncomment the flavour you want below:
  "~/.config/alacritty/gruvbox-dark.toml"
]

[window]
opacity = 0.85

[font]
normal = { family = "MesloLGS NF", style = "Regular" }
bold   = { family = "MesloLGS NF", style = "Bold" }
italic = { family = "MesloLGS NF", style = "Italic" }
size = 10.0

[keyboard]
bindings = [
  { key = "N", mods = "Control|Shift", command = { program = "sh", args = ["-c", "WORKDIR_SET=1 alacritty"] } }
]
