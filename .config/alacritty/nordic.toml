[colors.primary]
background = "#242933"
foreground = "#BBC3D4"
bright_foreground = "#ECEFF4"
dim_foreground = "#D8DEE9"

[colors.cursor]
text = "#242933"
cursor = "#D8DEE9" # dim_foreground

[colors.vi_mode_cursor]
text = "#242933"
cursor = "#D8DEE9" # dim_foreground

[colors.selection]
